{% extends "users/basic.html" %}
{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>
  body{
    font-family:'Montserrat',sans-serif;
    background:linear-gradient(135deg,#f8f9fa,#eef2f7);
  }

  .payment-wrapper{
    max-width:760px;
    margin:auto;
    margin-top:60px;
  }

  .premium-card{
    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 14px 32px rgba(0,0,0,0.08);
    background:#ffffff;
  }

  .card-header{
    background:linear-gradient(135deg,#1e3a8a,#0d6efd);
    color:#fff;
    padding:28px;
    text-align:center;
  }

  .icon-circle{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#eef4ff;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    margin-bottom:18px;
  }

  .icon-circle i{
    font-size:40px;
    color:#0d6efd;
  }

  .detail-box{
    background:#f8fbff;
    border:1px solid #e4ecff;
    border-radius:14px;
    padding:22px;
  }

  .detail-row{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #ececec;
    font-size:15px;
  }

  .detail-row:last-child{
    border-bottom:none;
  }

  .label{
    color:#666;
    font-weight:600;
  }

  .value{
    color:#222;
    font-weight:700;
    text-align:right;
  }

  .total{
    font-size:20px;
    color:#198754;
  }

  .btn-premium{
    border-radius:35px;
    padding:14px 30px;
    font-weight:700;
    transition:0.3s ease;
    box-shadow:0 8px 18px rgba(0,0,0,0.12);
  }

  .btn-premium:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 24px rgba(0,0,0,0.16);
  }

  .secure-text{
    font-size:13px;
    color:#777;
  }
</style>

<div class="container">
  <div class="payment-wrapper">

    <div class="card premium-card">

      <div class="card-header">
        <h2 class="mb-0">
          <i class="fas fa-credit-card me-2"></i> Payment Summary
        </h2>
      </div>

      <div class="card-body p-5 text-center">

        <div class="icon-circle">
          <i class="fas fa-wallet"></i>
        </div>

        <h4 class="fw-bold mb-4">Review Your Booking</h4>

        <div class="detail-box text-start mb-4">

          <div class="detail-row">
            <span class="label">🎬 Movie</span>
            <span class="value">{{ movie_name }}</span>
          </div>

          <div class="detail-row">
            <span class="label">📍 Theater</span>
            <span class="value">{{ theater_name }}</span>
          </div>

          <div class="detail-row">
            <span class="label">💺 Seats</span>
            <span class="value">{{ seat_numbers }}</span>
          </div>

          <div class="detail-row">
            <span class="label">🎟️ Price / Seat</span>
            <span class="value">₹{{ ticket_price }}</span>
          </div>

          <div class="detail-row">
            <span class="label fw-bold">💰 Total Amount</span>
            <span class="value total">₹{{ total_price }}</span>
          </div>

        </div>

        <button id="checkout-button" class="btn btn-success btn-lg btn-premium w-100">
          <i class="fas fa-lock me-2"></i> Pay Securely with Stripe
        </button>

        <p class="secure-text mt-3 mb-0">
          🔒 100% Secure Payment Gateway
        </p>

      </div>

    </div>

  </div>
</div>

<script src="https://js.stripe.com/v3/"></script>
<script>
  const stripe = Stripe("{{ STRIPE_PUBLISHABLE_KEY }}");

  document.getElementById("checkout-button").addEventListener("click", function () {
    stripe.redirectToCheckout({
      sessionId: "{{ STRIPE_SESSION_ID }}"
    });
  });
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
{% endblock %}
