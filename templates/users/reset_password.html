{% extends "users/basic.html" %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

<style>
body{
  font-family:'Montserrat',sans-serif;
}

.reset-card{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:26px;
  backdrop-filter:blur(18px);
  box-shadow:0 0 35px rgba(255,0,200,.12);
}

.reset-title{
  color:#fff;
  font-size:32px;
  font-weight:700;
  text-align:center;
  margin-bottom:28px;
}

.reset-title i{
  color:#ff00c8;
}

label{
  color:#fff;
  font-weight:600;
  margin-bottom:8px;
}

form input,
form select,
form textarea{
  width:100%;
  padding:13px 16px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,.06);
  color:#fff;
  margin-bottom:14px;
}

form input:focus,
form select:focus,
form textarea:focus{
  outline:none;
  box-shadow:0 0 0 3px rgba(255,0,200,.18);
}

small{
  color:#bfbfbf !important;
}

.invalid-feedback{
  display:block;
  color:#ff6b81;
  font-size:14px;
}

.reset-btn{
  width:100%;
  border:none;
  border-radius:14px;
  padding:14px;
  font-size:17px;
  font-weight:700;
  margin-top:10px;
}

.back-link{
  color:#ddd;
  text-decoration:none;
  font-weight:600;
}

.back-link:hover{
  color:#ff00c8;
  text-decoration:none;
}
</style>

<div class="container py-5">
  <div class="row justify-content-center">

    <div class="col-md-7 col-lg-6">

      <div class="reset-card p-4 p-md-5">

        <div class="reset-title">
          <i class="fas fa-lock mr-2"></i> Reset Password
        </div>

        <form method="POST" novalidate>
          {% csrf_token %}

          {% for field in form %}
          <div class="mb-3">

            <label for="{{ field.id_for_label }}">
              {{ field.label }}
            </label>

            {{ field }}

            {% if field.help_text %}
            <small>{{ field.help_text }}</small>
            {% endif %}

            {% for error in field.errors %}
            <div class="invalid-feedback">{{ error }}</div>
            {% endfor %}

          </div>
          {% endfor %}

          <button class="btn btn-primary reset-btn" type="submit">
            <i class="fas fa-key mr-2"></i> Reset Password
          </button>

        </form>

      </div>

      <div class="text-center mt-4">
        <a href="{% url 'login' %}" class="back-link">
          <i class="fas fa-arrow-left mr-2"></i> Back to Login
        </a>
      </div>

    </div>

  </div>
</div>

{% endblock %}
