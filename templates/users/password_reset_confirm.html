{% extends "users/basic.html" %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>
  body{
    font-family:'Montserrat',sans-serif;
    background:linear-gradient(135deg,#f8f9fa,#eef2f7);
  }

  .reset-wrapper{
    max-width:700px;
    margin:auto;
    margin-top:70px;
  }

  .premium-card{
    border:none;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 14px 32px rgba(0,0,0,0.08);
  }

  .card-header{
    background:linear-gradient(135deg,#0d6efd,#1e3a8a);
    color:#fff;
    text-align:center;
    padding:25px;
  }

  .icon-circle{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#e8f0ff;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    margin-bottom:20px;
  }

  .icon-circle i{
    font-size:40px;
    color:#0d6efd;
  }

  form p{
    margin-bottom:18px;
    text-align:left;
  }

  form label{
    font-weight:600;
    margin-bottom:8px;
    display:block;
    color:#333;
  }

  form input{
    width:100%;
    padding:12px 15px;
    border:1px solid #d0d7e2;
    border-radius:10px;
    outline:none;
    transition:0.3s ease;
  }

  form input:focus{
    border-color:#0d6efd;
    box-shadow:0 0 0 4px rgba(13,110,253,0.12);
  }

  ul{
    padding-left:18px;
    color:#777;
    font-size:14px;
  }

  .btn-premium{
    border-radius:30px;
    padding:12px 28px;
    font-weight:600;
    transition:0.3s ease;
  }

  .btn-premium:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 18px rgba(0,0,0,0.12);
  }
</style>

<div class="container">
  <div class="reset-wrapper">
    <div class="card premium-card">

      <div class="card-header">
        <h2 class="mb-0">
          <i class="fas fa-lock me-2"></i> Set New Password
        </h2>
      </div>

      <div class="card-body p-5">

        <div class="icon-circle">
          <i class="fas fa-key"></i>
        </div>

        <h4 class="text-center fw-bold mb-4">Create a Strong Password</h4>

        <form method="POST">
          {% csrf_token %}
          {{ form.as_p }}

          <div class="text-center mt-4">
            <button class="btn btn-primary btn-premium" type="submit">
              <i class="fas fa-check-circle me-2"></i> Set New Password
            </button>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
{% endblock %}
