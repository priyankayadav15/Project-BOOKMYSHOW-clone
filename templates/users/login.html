{% extends "users/basic.html" %}

{% block content %}

<style>
.login-wrap{
  min-height:80vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-box{
  width:100%;
  max-width:480px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(16px);
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 0 35px rgba(255,0,200,.18);
}

.login-head{
  padding:28px;
  background:linear-gradient(135deg,#ff00c8,#7b2cff);
  text-align:center;
}

.login-head h3{
  margin:0;
  color:#fff;
  font-weight:700;
}

.login-body{
  padding:32px;
}

.form-label{
  color:#fff;
  font-weight:500;
  margin-bottom:8px;
}

.input-group{
  margin-bottom:18px;
}

.input-group-text{
  background:rgba(255,255,255,.08);
  border:none;
  color:#fff;
  border-radius:14px 0 0 14px;
}

.input-group input{
  background:rgba(255,255,255,.05)!important;
  border:none!important;
  color:#fff!important;
  height:48px;
}

.input-group input:focus{
  box-shadow:none!important;
}

.toggle-btn{
  background:rgba(255,255,255,.08)!important;
  border:none!important;
  color:#fff!important;
  border-radius:0 14px 14px 0;
}

.login-btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#ff00c8,#7b2cff);
  color:#fff;
  font-weight:700;
  transition:.3s ease;
}

.login-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 20px rgba(255,0,200,.35);
}

.login-footer{
  padding:0 32px 28px;
  text-align:center;
}

.login-footer a{
  color:#ff7df0;
  text-decoration:none;
}

.login-footer a:hover{
  color:#fff;
}

.small-text{
  color:#bdbdbd;
}
</style>

<div class="login-wrap">
  <div class="login-box">

    <div class="login-head">
      <h3><i class="fas fa-sign-in-alt mr-2"></i> Login</h3>
    </div>

    <div class="login-body">
      <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <label for="{{ form.username.id_for_label }}" class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-user"></i></span>
          {{ form.username }}
        </div>

        <label for="{{ form.password.id_for_label }}" class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          {{ form.password }}
          <div class="input-group-append">
            <button class="btn toggle-btn" type="button" id="togglePassword">
              <i class="fas fa-eye" id="toggleIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="login-btn mt-2">
          <i class="fas fa-arrow-right mr-2"></i> Secure Login
        </button>
      </form>
    </div>

    <div class="login-footer">
      <a href="{% url 'password_reset' %}">Forgot Password?</a>
      <hr style="border-color:rgba(255,255,255,.08);">
      <p class="small-text mb-0">
        Don’t have an account?
        <a href="{% url 'register' %}">Create Account</a>
      </p>
    </div>

  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const togglePassword = document.getElementById('togglePassword');
  const passwordField = document.getElementById('{{ form.password.id_for_label }}');
  const toggleIcon = document.getElementById('toggleIcon');

  togglePassword.addEventListener('click', function () {
    const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordField.setAttribute('type', type);
    toggleIcon.classList.toggle('fa-eye');
    toggleIcon.classList.toggle('fa-eye-slash');
  });
});
</script>

{% endblock %}
