{% extends "users/basic.html" %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>
  body{
    font-family:'Montserrat',sans-serif;
    background:#f8f9fa;
  }

  .logout-wrapper{
    max-width:700px;
    margin:70px auto;
  }

  .logout-card{
    background:#ffffff;
    border:none;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 14px 35px rgba(0,0,0,0.08);
  }

  .logout-header{
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    color:#fff;
    text-align:center;
    padding:40px 30px;
  }

  .logout-icon{
    font-size:72px;
    margin-bottom:14px;
  }

  .logout-header h2{
    font-weight:700;
    margin-bottom:8px;
  }

  .logout-body{
    padding:38px;
    text-align:center;
  }

  .message-box{
    background:#f1f5f9;
    border-radius:14px;
    padding:18px;
    margin-bottom:25px;
    color:#334155;
    font-size:16px;
  }

  .btn-premium{
    border-radius:30px;
    padding:12px 28px;
    font-weight:600;
    transition:0.3s ease;
  }

  .btn-premium:hover{
    transform:translateY(-2px);
  }
</style>

<div class="container">
  <div class="logout-wrapper">

    <div class="logout-card">

      <div class="logout-header">
        <div class="logout-icon">👋</div>
        <h2>You Have Been Logged Out</h2>
        <p class="mb-0">Thank you for visiting BookMySeat</p>
      </div>

      <div class="logout-body">

        <div class="message-box">
          Your session has ended successfully.  
          We hope to see you again soon for your next movie experience 🍿
        </div>

        <div class="mt-4">
          <a href="{% url 'login' %}" class="btn btn-primary btn-premium me-2">
            🔐 Login Again
          </a>

          <a href="{% url 'movie_list' %}" class="btn btn-outline-secondary btn-premium">
            🎬 Go to Home
          </a>
        </div>

      </div>

    </div>

  </div>
</div>

{% endblock %}
