{% extends "users/base_generic.html" %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>
  body{
    font-family:'Montserrat',sans-serif;
    background:linear-gradient(135deg,#f8f9fa,#eef2f7);
  }

  .complete-wrapper{
    max-width:700px;
    margin:auto;
    margin-top:80px;
  }

  .premium-card{
    border:none;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 14px 35px rgba(0,0,0,0.08);
  }

  .card-header{
    background:linear-gradient(135deg,#198754,#0f5132);
    color:#fff;
    text-align:center;
    padding:28px;
  }

  .success-circle{
    width:95px;
    height:95px;
    border-radius:50%;
    background:#e8fff1;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    margin-bottom:20px;
  }

  .success-circle i{
    font-size:42px;
    color:#198754;
  }

  .message{
    font-size:17px;
    color:#555;
    line-height:1.8;
  }

  .btn-premium{
    border-radius:30px;
    padding:12px 30px;
    font-weight:600;
    transition:0.3s ease;
  }

  .btn-premium:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 18px rgba(0,0,0,0.12);
  }

  a{
    text-decoration:none;
  }
</style>

<div class="container">
  <div class="complete-wrapper">
    <div class="card premium-card">

      <div class="card-header">
        <h2 class="mb-0">
          <i class="fas fa-check-circle me-2"></i> Password Reset Complete
        </h2>
      </div>

      <div class="card-body text-center p-5">

        <div class="success-circle">
          <i class="fas fa-lock-open"></i>
        </div>

        <h4 class="fw-bold mb-3">Password Updated Successfully</h4>

        <p class="message mb-4">
          Your password has been successfully reset.  
          You can now log in securely using your new password.
        </p>

        <a href="{% url 'login' %}" class="btn btn-success btn-premium">
          <i class="fas fa-sign-in-alt me-2"></i> Go to Login
        </a>

      </div>
    </div>
  </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
{% endblock %}
